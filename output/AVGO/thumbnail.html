<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px; height: 720px; overflow: hidden;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', Arial, sans-serif;
    background: #060c14;
    color: #f1f5f9;
    position: relative;
  }

  /* ── Background layers ── */
  .bg-grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, #1a2540 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
  }
  .bg-glow-left {
    position: absolute;
    top: -120px; left: -80px;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, transparent 70%);
  }
  .bg-glow-right {
    position: absolute;
    bottom: -100px; right: -60px;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(244,63,94,0.22) 0%, transparent 70%);
  }
  .bg-line {
    position: absolute;
    top: 0; left: 680px; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(59,130,246,0.4) 30%, rgba(59,130,246,0.4) 70%, transparent);
  }

  /* ── Layout ── */
  .layout {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 1fr 520px;
    height: 100%;
  }

  /* ── Left panel ── */
  .left {
    padding: 52px 44px 52px 72px;
    display: flex; flex-direction: column; justify-content: center;
  }

  .eyebrow {
    font-size: 22px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: #3b82f6; margin-bottom: 20px;
  }
  .eyebrow span { color: #64748b; }

  .hook {
    font-size: 76px;
    font-weight: 900;
    line-height: 1.18;
    color: #f1f5f9;
    margin-bottom: 28px;
    letter-spacing: -0.01em;
  }
  .hook em {
    font-style: normal;
    color: #f43f5e;
    position: relative;
  }

  .subhook {
    font-size: 26px; font-weight: 600;
    color: #94a3b8; line-height: 1.5;
    border-left: 3px solid #3b82f6;
    padding-left: 16px;
  }

  /* ── Right panel ── */
  .right {
    padding: 48px 52px 48px 40px;
    display: flex; flex-direction: column;
    justify-content: center; gap: 18px;
  }

  .price-card {
    background: rgba(17,24,39,0.9);
    border: 1px solid #1f2d40;
    border-radius: 20px;
    padding: 28px 32px;
    text-align: center;
  }
  .price-label { font-size: 14px; color: #64748b; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
  .price-val   { font-size: 64px; font-weight: 900; color: #f1f5f9; line-height: 1; margin-bottom: 10px; }
  .price-chg   {
    display: inline-block; font-size: 22px; font-weight: 800;
    padding: 5px 20px; border-radius: 24px;
  }
  .price-chg.up   { background: rgba(16,185,129,0.18); color: #10b981; }
  .price-chg.down { background: rgba(244,63,94,0.18);  color: #f43f5e; }

  .metrics-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .metric-card {
    background: rgba(17,24,39,0.85);
    border: 1px solid #1f2d40;
    border-radius: 14px; padding: 16px 18px;
    text-align: center;
  }
  .metric-label { font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .metric-val   { font-size: 28px; font-weight: 800; color: #f1f5f9; }
  .metric-val.green { color: #10b981; }
  .metric-val.red   { color: #f43f5e; }
  .metric-val.gold  { color: #f59e0b; }

  .verdict-pill {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 24px; border-radius: 14px; font-size: 20px; font-weight: 800;
    letter-spacing: 0.05em;
  }
  .verdict-pill.bullish { background: rgba(16,185,129,0.14); border: 1px solid rgba(16,185,129,0.4); color: #10b981; }
  .verdict-pill.bearish { background: rgba(244,63,94,0.14);  border: 1px solid rgba(244,63,94,0.4);  color: #f43f5e; }
  .verdict-pill.neutral { background: rgba(245,158,11,0.14); border: 1px solid rgba(245,158,11,0.4); color: #f59e0b; }

  /* ── Footer strip ── */
  .footer {
    position: absolute; z-index: 2;
    bottom: 0; left: 0; right: 0;
    height: 52px;
    background: rgba(6,12,20,0.92);
    border-top: 1px solid #1f2d40;
    display: flex; align-items: center;
    padding: 0 72px;
    justify-content: space-between;
  }
  .footer-left  { font-size: 16px; color: #64748b; }
  .footer-right { font-size: 15px; color: #374151; }
  .footer-ticker { font-size: 20px; font-weight: 800; color: #3b82f6; letter-spacing: 0.18em; margin-right: 8px; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow-left"></div>
<div class="bg-glow-right"></div>
<div class="bg-line"></div>

<div class="layout">

  <!-- Left: Hook -->
  <div class="left">
    <div class="eyebrow">AVGO <span>·</span> 周度深度</div>
    <div class="hook">利好不断？<em>超买</em>闪现！</div>
    <div class="subhook">警惕回调风险！</div>
  </div>

  <!-- Right: Data cards -->
  <div class="right">
    <div class="price-card">
      <div class="price-label">当前股价</div>
      <div class="price-val">$446.77</div>
      <div class="price-chg up">
        +4.73%
      </div>
    </div>

    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-label">Fwd PE</div>
        <div class="metric-val gold">24.23x</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">PEG</div>
        <div class="metric-val green">0.93</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">52W 区间</div>
        <div class="metric-val red">99.0%</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">机构持仓</div>
        <div class="metric-val">80.2%</div>
      </div>
    </div>

    <div class="verdict-pill bearish">
      ▼ 看空
    </div>
  </div>

</div>

<div class="footer">
  <div class="footer-left">
    <span class="footer-ticker">AVGO</span>Broadcom Inc.
  </div>
  <div class="footer-right">2026-05-29 · AI 股票深度点评</div>
</div>

</body>
</html>
